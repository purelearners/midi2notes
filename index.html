<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIDI to Sheet Music Recorder</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/vexflow/build/cjs/vexflow.js"></script>
</head>
<body>
    <div class="container">
        <h1>MIDI Recorder</h1>
        <div class="controls">
            <button id="startBtn">🔴 Start Recording</button>
            <button id="stopBtn" disabled>⏹️ Stop & Render</button>
        </div>
        <div class="status-panel">
            <p id="status">Status: Waiting for MIDI connection...</p>
        </div>
        
        <div id="piano" class="piano"></div>
        
        <div id="sheet-music-output"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
